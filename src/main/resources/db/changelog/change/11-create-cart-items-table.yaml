databaseChangeLog:
  - changeSet:
      id: create-cart-items-table
      author: Constantin-Haranskiy
      changes:
        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: shopping_cart_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_shopping_cart_id
                    references: shopping_carts(user_id)
                    nullable: false
              - column:
                  name: book_id
                  type: bigint
                  constraints:
                    foreignKeyName: fk_item_book_id
                    references: books(id)
                    nullable: false
              - column:
                  name: quantity
                  type: int
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            columnNames: id, book_id
            constraintName: id_book_id
            tableName: cart_items
            validate: true
