databaseChangeLog:
  - changeSet:
      id: assign-user-role-to-existing-users
      author: Constantin-Haranskiy
      changes:
        - sql:
            sql: |
              INSERT INTO users_roles (user_id, role_id)
              SELECT u.id, r.id
              FROM users u
              LEFT JOIN users_roles
              ON u.id = users_roles.user_id
              LEFT JOIN roles r
              ON r.name = 'USER'
              WHERE role_id IS NULL
              AND user_id IS NULL